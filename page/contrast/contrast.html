<style>
    .contrast-wrap {
        height: calc(100vh - 45px);
        max-width: 1200px;
        margin: 0 auto;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        background: var(--c-bg);
        border-left: 1px solid var(--c-border);
        border-right: 1px solid var(--c-border);
    }

    /* Tab strip */
    .contrast-tabs {
        flex-shrink: 0;
        display: flex;
        align-items: stretch;
        overflow-x: auto;
        border-bottom: 1px solid var(--c-border);
        background: var(--c-bg);
        scrollbar-width: none;
    }

    .contrast-tabs::-webkit-scrollbar {
        display: none;
    }

    .contrast-tab {
        flex-shrink: 0;
        padding: 0 18px;
        height: 40px;
        display: flex;
        align-items: center;
        cursor: pointer;
        font-family: var(--c-mono);
        font-size: 11.5px;
        color: var(--c-text2);
        border-bottom: 2px solid transparent;
        border-right: 1px solid var(--c-border);
        transition: all .15s;
        user-select: none;
        white-space: nowrap;
    }

    .contrast-tab:hover {
        color: var(--c-text);
        background: rgba(255, 87, 34, .025);
    }

    .contrast-tab.active {
        color: var(--c-brand);
        border-bottom-color: var(--c-brand);
        background: rgba(255, 87, 34, .04);
    }

    /* Code panel */
    .contrast-code {
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        background: #0A0A0F;
        min-height: 0;
    }

    .panel-bar {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 6px;
        height: 36px;
        padding: 0 16px;
        background: #0A0A0F;
    }

    .pb-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    #erupt-code {
        margin: 0;
        flex: 1;
        border-radius: 0;
        background: #0A0A0F;
        font-family: var(--c-mono);
        font-size: 12.5px;
        overflow: auto;
    }

    #erupt-code code {
        background: transparent;
    }

    .demo-btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 5px 12px;
        background: var(--c-brand);
        border: none;
        border-radius: 3px;
        font-family: var(--c-mono);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: .06em;
        color: #fff;
        text-decoration: none;
        transition: opacity .15s;
        white-space: nowrap;
    }

    .demo-btn:hover {
        opacity: .85;
        color: #fff;
        text-decoration: none;
    }

    .demo-btn svg {
        flex-shrink: 0;
    }

    #main {
        margin-bottom: 0 !important;
    }
</style>

<div ng-controller="contrast">
    <div class="contrast-wrap">

        <!-- Tab strip -->
        <div class="contrast-tabs">
            <div class="contrast-tab"
                 ng-class="{active: active.id === p.id}"
                 ng-click="choicePage(p)"
                 ng-repeat="p in pages">
                {{p.key | i18n}}
            </div>
        </div>

        <!-- Code panel -->
        <div class="contrast-code">
            <div class="panel-bar">
                <span class="pb-dot" style="background:#ff5f57"></span>
                <span class="pb-dot" style="background:#ffbd2e"></span>
                <span class="pb-dot" style="background:#28c840"></span>
                <span style="flex:1;text-align:center;font-family:var(--c-mono);font-size:10px;color:rgba(255,255,255,.22);letter-spacing:.1em">{{'contrast.java' | i18n}}</span>
                <a class="demo-btn" ng-href="{{'https://demo.erupt.xyz/#' + active.path}}" target="_blank">
                    <svg fill="none" height="11" viewBox="0 0 12 12" width="11" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2 2h4v1H3v6h6V7h1v3H2V2z" fill="currentColor"/>
                        <path d="M7 2h3v3h-1V3.7L5.85 6.85l-.7-.7L8.3 3H7V2z" fill="currentColor"/>
                    </svg>
                    {{'contrast.effect' | i18n}}
                </a>
            </div>
            <pre id="erupt-code"><code class="prism language-java"></code></pre>
        </div>

    </div>
</div>
